<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Corridas DB — Painel de Controle</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --black: #0a0a0c;
    --surface: #111115;
    --card: #16161c;
    --border: #2a2a35;
    --pink: #ff2d78;
    --pink-dim: #c4155a;
    --pink-glow: rgba(255,45,120,0.18);
    --cyan: #00e5ff;
    --text: #e8e8f0;
    --muted: #6a6a80;
    --green: #00ff88;
    --yellow: #ffd600;
    --red: #ff3b3b;
    --radius: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BG GRID ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,45,120,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,45,120,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,12,.85);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex; align-items: center; gap: 14px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--pink);
    clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
    animation: spin 8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .logo-text {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem; font-weight: 900;
    letter-spacing: 3px; color: #fff;
  }
  .logo-text span { color: var(--pink); }

  .header-status {
    font-size: .72rem; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase;
  }
  .dot {
    display: inline-block; width: 7px; height: 7px;
    background: var(--green); border-radius: 50%;
    margin-right: 6px; animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

  /* ── LAYOUT ── */
  main {
    position: relative; z-index: 5;
    max-width: 1300px; margin: 0 auto;
    padding: 40px 30px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
  }

  /* ── TABS ── */
  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: .65rem; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    transition: border-color .3s;
  }
  .card:hover { border-color: var(--pink-dim); }

  /* ── FULL WIDTH ── */
  .full { grid-column: 1 / -1; }

  /* ── STATS ROW ── */
  .stats-row {
    display: flex; gap: 16px; margin-bottom: 30px;
  }
  .stat-box {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    display: flex; flex-direction: column; gap: 6px;
    transition: border-color .3s, box-shadow .3s;
  }
  .stat-box:hover {
    border-color: var(--pink);
    box-shadow: 0 0 24px var(--pink-glow);
  }
  .stat-label {
    font-size: .65rem; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted);
  }
  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 2rem; font-weight: 900; color: #fff;
  }
  .stat-value span { color: var(--pink); }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse;
    font-size: .88rem;
  }
  thead tr {
    border-bottom: 2px solid var(--pink);
  }
  th {
    font-family: 'Orbitron', monospace;
    font-size: .58rem; letter-spacing: 3px;
    text-transform: uppercase; color: var(--pink);
    padding: 10px 14px; text-align: left;
    font-weight: 700;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .2s;
  }
  tbody tr:hover { background: rgba(255,45,120,.06); }
  td {
    padding: 11px 14px; color: var(--text);
    vertical-align: middle;
  }
  td .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: .72rem; font-weight: 500;
    background: rgba(255,45,120,.15);
    color: var(--pink);
    border: 1px solid var(--pink-dim);
  }
  td .badge.green { background: rgba(0,255,136,.12); color: var(--green); border-color: var(--green); }
  td .badge.cyan  { background: rgba(0,229,255,.12); color: var(--cyan);  border-color: var(--cyan); }

  /* ── FORMS ── */
  .tab-nav {
    display: flex; gap: 6px; margin-bottom: 22px;
  }
  .tab-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Orbitron', monospace;
    font-size: .6rem; letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .25s;
  }
  .tab-btn.active, .tab-btn:hover {
    border-color: var(--pink);
    color: var(--pink);
    background: var(--pink-glow);
  }

  .form-panel { display: none; }
  .form-panel.active { display: block; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .form-grid.single { grid-template-columns: 1fr; }

  .field {
    display: flex; flex-direction: column; gap: 6px;
  }
  .field label {
    font-size: .65rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
  }
  .field input, .field select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    outline: none;
    transition: border-color .25s, box-shadow .25s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px var(--pink-glow);
  }
  .field select option { background: var(--card); }

  .btn-submit {
    margin-top: 18px;
    width: 100%;
    padding: 13px;
    background: var(--pink);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: .7rem; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer;
    transition: background .25s, box-shadow .25s, transform .15s;
  }
  .btn-submit:hover {
    background: var(--pink-dim);
    box-shadow: 0 0 28px var(--pink-glow);
    transform: translateY(-1px);
  }
  .btn-submit:active { transform: translateY(0); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 30px; right: 30px; z-index: 999;
    background: var(--card);
    border: 1px solid var(--pink);
    border-radius: 10px;
    padding: 14px 22px;
    font-size: .85rem; color: var(--text);
    box-shadow: 0 0 30px var(--pink-glow);
    transform: translateY(20px); opacity: 0;
    transition: all .35s cubic-bezier(.22,1,.36,1);
    pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { border-color: var(--red); box-shadow: 0 0 30px rgba(255,59,59,.18); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: .85rem;
  }
  .empty svg { margin-bottom: 12px; opacity: .4; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--pink-dim); border-radius: 10px; }

  /* ── RESPONSIVE ── */
  @media(max-width:900px) {
    main { grid-template-columns: 1fr; padding: 20px 16px; }
    .full { grid-column: 1; }
    .stats-row { flex-wrap: wrap; }
    header { padding: 14px 18px; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <div class="logo-text">CORRIDAS<span>DB</span></div>
  </div>
  <div class="header-status">
    <span class="dot"></span>Sistema Ativo
  </div>
</header>

<main>

  <!-- STATS -->
  <div class="full stats-row" id="statsRow">
    <div class="stat-box">
      <div class="stat-label">Corredores</div>
      <div class="stat-value" id="statCorredores">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Voltas Registradas</div>
      <div class="stat-value" id="statVoltas">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Melhor Tempo</div>
      <div class="stat-value" id="statMelhor">—<span>s</span></div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Usuários</div>
      <div class="stat-value" id="statUsers">—</div>
    </div>
  </div>

  <!-- TABLE: CORREDORES -->
  <div class="card full">
    <div class="section-title">Corredores</div>
    <div class="table-wrap">
      <table id="tblCorredores">
        <thead>
          <tr>
            <th>#</th><th>Nome</th><th>Email</th><th>Turma</th><th>Equipe</th>
          </tr>
        </thead>
        <tbody id="bodyCorredores">
          <tr><td colspan="5"><div class="empty">Sem dados locais</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- TABLE: VOLTAS -->
  <div class="card full">
    <div class="section-title">Voltas</div>
    <div class="table-wrap">
      <table id="tblVoltas">
        <thead>
          <tr>
            <th>#</th><th>Corredor</th><th>Tempo (s)</th><th>Data</th>
          </tr>
        </thead>
        <tbody id="bodyVoltas">
          <tr><td colspan="4"><div class="empty">Sem dados locais</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- TABLE: USERS -->
  <div class="card full">
    <div class="section-title">Usuários do Sistema</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>Nome</th><th>Email</th></tr>
        </thead>
        <tbody id="bodyUsers">
          <tr><td colspan="3"><div class="empty">Sem dados locais</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- FORMS -->
  <div class="card full">
    <div class="section-title">Inserir Dados</div>
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('corredor')">Corredor</button>
      <button class="tab-btn" onclick="switchTab('volta')">Volta</button>
      <button class="tab-btn" onclick="switchTab('user')">Usuário</button>
    </div>

    <!-- FORM CORREDOR -->
    <div class="form-panel active" id="panel-corredor">
      <div class="form-grid">
        <div class="field"><label>Nome</label><input id="c-nome" type="text" placeholder="Nome completo"/></div>
        <div class="field"><label>Email</label><input id="c-email" type="email" placeholder="email@exemplo.com"/></div>
        <div class="field"><label>Senha</label><input id="c-senha" type="password" placeholder="••••••••"/></div>
        <div class="field"><label>Turma</label><input id="c-turma" type="text" placeholder="Ex: 3EM A"/></div>
        <div class="field"><label>Equipe</label><input id="c-equipe" type="text" placeholder="Nome da equipe"/></div>
      </div>
      <button class="btn-submit" onclick="addCorredor()">▶ Cadastrar Corredor</button>
    </div>

    <!-- FORM VOLTA -->
    <div class="form-panel" id="panel-volta">
      <div class="form-grid">
        <div class="field">
          <label>Corredor</label>
          <select id="v-corredor">
            <option value="">— Selecione —</option>
          </select>
        </div>
        <div class="field"><label>Tempo (segundos)</label><input id="v-tempo" type="number" step="0.01" placeholder="Ex: 45.83"/></div>
        <div class="field"><label>Data / Hora</label><input id="v-data" type="datetime-local"/></div>
      </div>
      <button class="btn-submit" onclick="addVolta()">▶ Registrar Volta</button>
    </div>

    <!-- FORM USER -->
    <div class="form-panel" id="panel-user">
      <div class="form-grid">
        <div class="field"><label>Nome</label><input id="u-nome" type="text" placeholder="Nome completo"/></div>
        <div class="field"><label>Email</label><input id="u-email" type="email" placeholder="email@exemplo.com"/></div>
        <div class="field"><label>Senha</label><input id="u-senha" type="password" placeholder="••••••••"/></div>
      </div>
      <button class="btn-submit" onclick="addUser()">▶ Criar Usuário</button>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
// ── STATE (simulates DB in-memory) ──
const DB = {
  corredores: [],
  voltas: [],
  users: [],
  _nextId: { corredores: 1, voltas: 1, users: 1 }
};

// ── HELPERS ──
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type === 'error' ? 'error show' : 'show';
  setTimeout(() => { el.className = ''; }, 3200);
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    const tabs = ['corredor','volta','user'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleString('pt-BR');
}

// ── RENDER ──
function renderAll() {
  renderCorredores(); renderVoltas(); renderUsers(); renderStats(); renderSelect();
}

function renderCorredores() {
  const tbody = document.getElementById('bodyCorredores');
  if (!DB.corredores.length) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty">Nenhum corredor cadastrado</div></td></tr>';
    return;
  }
  tbody.innerHTML = DB.corredores.map(c => `
    <tr>
      <td>${c.id}</td>
      <td>${c.nome}</td>
      <td>${c.email}</td>
      <td><span class="badge cyan">${c.turma}</span></td>
      <td><span class="badge">${c.equipe}</span></td>
    </tr>`).join('');
}

function renderVoltas() {
  const tbody = document.getElementById('bodyVoltas');
  if (!DB.voltas.length) {
    tbody.innerHTML = '<tr><td colspan="4"><div class="empty">Nenhuma volta registrada</div></td></tr>';
    return;
  }
  const sorted = [...DB.voltas].sort((a,b) => a.tempo - b.tempo);
  const best = sorted[0]?.id;
  tbody.innerHTML = sorted.map(v => {
    const corredor = DB.corredores.find(c => c.id === v.corredores_id);
    return `
      <tr>
        <td>${v.id}</td>
        <td>${corredor ? corredor.nome : 'Desconhecido'}</td>
        <td>${v.id === best ? '<span class="badge green">🏁 ' + Number(v.tempo).toFixed(2) + 's</span>' : Number(v.tempo).toFixed(2) + 's'}</td>
        <td>${fmtDate(v.data)}</td>
      </tr>`;
  }).join('');
}

function renderUsers() {
  const tbody = document.getElementById('bodyUsers');
  if (!DB.users.length) {
    tbody.innerHTML = '<tr><td colspan="3"><div class="empty">Nenhum usuário cadastrado</div></td></tr>';
    return;
  }
  tbody.innerHTML = DB.users.map(u => `
    <tr>
      <td>${u.id_users}</td>
      <td>${u.nome}</td>
      <td>${u.email}</td>
    </tr>`).join('');
}

function renderStats() {
  document.getElementById('statCorredores').textContent = DB.corredores.length;
  document.getElementById('statVoltas').textContent = DB.voltas.length;
  document.getElementById('statUsers').textContent = DB.users.length;
  const best = DB.voltas.length ? Math.min(...DB.voltas.map(v => v.tempo)) : null;
  document.getElementById('statMelhor').innerHTML = best !== null
    ? Number(best).toFixed(2) + '<span>s</span>'
    : '—';
}

function renderSelect() {
  const sel = document.getElementById('v-corredor');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— Selecione —</option>';
  DB.corredores.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = `${c.nome} (${c.equipe})`;
    sel.appendChild(opt);
  });
  if (cur) sel.value = cur;
}

// ── ACTIONS ──
function addCorredor() {
  const nome  = document.getElementById('c-nome').value.trim();
  const email = document.getElementById('c-email').value.trim();
  const senha = document.getElementById('c-senha').value.trim();
  const turma = document.getElementById('c-turma').value.trim();
  const equipe= document.getElementById('c-equipe').value.trim();
  if (!nome || !email || !senha || !turma || !equipe)
    return toast('Preencha todos os campos do corredor.', 'error');

  DB.corredores.push({ id: DB._nextId.corredores++, nome, email, senha, turma, equipe });
  ['c-nome','c-email','c-senha','c-turma','c-equipe'].forEach(id => document.getElementById(id).value = '');
  renderAll();
  toast(`✓ Corredor "${nome}" cadastrado!`);
}

function addVolta() {
  const corredores_id = parseInt(document.getElementById('v-corredor').value);
  const tempo = parseFloat(document.getElementById('v-tempo').value);
  const dataVal = document.getElementById('v-data').value;
  if (!corredores_id || isNaN(tempo) || !dataVal)
    return toast('Preencha todos os campos da volta.', 'error');

  DB.voltas.push({ id: DB._nextId.voltas++, tempo, data: new Date(dataVal).toISOString(), corredores_id });
  document.getElementById('v-tempo').value = '';
  document.getElementById('v-data').value = '';
  document.getElementById('v-corredor').value = '';
  renderAll();
  toast(`✓ Volta de ${tempo.toFixed(2)}s registrada!`);
}

function addUser() {
  const nome  = document.getElementById('u-nome').value.trim();
  const email = document.getElementById('u-email').value.trim();
  const senha = document.getElementById('u-senha').value.trim();
  if (!nome || !email || !senha)
    return toast('Preencha todos os campos do usuário.', 'error');

  DB.users.push({ id_users: DB._nextId.users++, nome, email, senha });
  ['u-nome','u-email','u-senha'].forEach(id => document.getElementById(id).value = '');
  renderAll();
  toast(`✓ Usuário "${nome}" criado!`);
}

// ── INIT ──
// Set datetime-local default to now
const now = new Date();
now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
document.getElementById('v-data').value = now.toISOString().slice(0,16);

renderAll();
</script>
</body>
</html>
